{% extends "base.html" %}
{% block title %}Profile - Targetify{% endblock %}
{% block content %}
<div class="w-full max-w-md bg-white rounded-xl shadow-sm border p-8 mx-auto">
  <h1 class="text-2xl font-bold mb-2 text-[#000435] text-center">Your Profile</h1>
  <p class="text-gray-500 mb-6 text-center">Manage your account settings.</p>
  <div class="space-y-4">
    <div class="flex justify-between items-center border-b pb-2">
      <span class="text-gray-700">Name</span>
      <span class="font-medium">{{ user.username }}</span>
    </div>
    <div class="flex justify-between items-center border-b pb-2">
      <span class="text-gray-700">Email</span>
      <span class="font-medium">{{ user.email }}</span>
    </div>
    <div class="flex justify-between items-center border-b pb-2">
      <span class="text-gray-700">Plan</span>
      <span class="font-medium">Free</span>
  </div>
  <a href="/accounts/logout/" class="block text-center bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 font-medium">Logout</a>
</div>
{% endblock %}
